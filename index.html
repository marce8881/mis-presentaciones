<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Presentaciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --border: rgba(255,255,255,0.07);
      --accent: #e8ff47;
      --accent-dim: rgba(232,255,71,0.12);
      --text: #f0ede8;
      --muted: #6b6865;
      --tag-bg: rgba(255,255,255,0.05);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 24px 80px;
    }

    /* ── HEADER ── */
    header {
      max-width: 900px;
      margin: 0 auto;
      padding: 72px 0 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    .header-left h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .header-left h1 span {
      color: var(--accent);
    }

    .header-left p {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
      max-width: 380px;
      line-height: 1.6;
    }

    .header-right {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .header-right .count {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      display: block;
      line-height: 1;
    }

    /* ── GRID ── */
    .grid {
      max-width: 900px;
      margin: 56px auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s forwards;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }
    .card:nth-child(5) { animation-delay: 0.33s; }
    .card:nth-child(6) { animation-delay: 0.40s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: inherit;
    }

    .card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .card:hover::before { opacity: 1; }

    .card-number {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .tag {
      font-size: 0.72rem;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 10px;
      border-radius: 99px;
    }

    .arrow {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .card:hover .arrow {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── ADD CARD (placeholder) ── */
    .card-add {
      border-style: dashed;
      border-color: rgba(255,255,255,0.1);
      background: transparent;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      cursor: default;
      gap: 8px;
    }

    .card-add:hover {
      border-color: rgba(232,255,71,0.3);
      background: rgba(232,255,71,0.03);
      transform: none;
    }

    .card-add:hover::before { opacity: 0; }

    .card-add .plus {
      font-size: 1.6rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1;
      transition: color 0.2s;
    }

    .card-add:hover .plus { color: var(--accent); }

    .card-add span {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── FOOTER ── */
    footer {
      max-width: 900px;
      margin: 64px auto 0;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>Mis<br><span>Presentaciones</span></h1>
      <p>Colección de presentaciones interactivas. Cada una vive en su propia carpeta y se versiona con Git.</p>
    </div>
    <div class="header-right">
      <span class="count" id="count">01</span>
      presentaciones
    </div>
  </header>

  <div class="grid" id="grid">

    <!-- ── PRESENTACIÓN 1 — edita este bloque para cada nueva ── -->
    <a class="card" href="./presentacion-1/index.html">
      <span class="card-number">01</span>
      <div class="card-title">Nombre de tu presentación</div>
      <p class="card-desc">Breve descripción del contenido o propósito de esta presentación.</p>
      <div class="card-footer">
        <span class="tag">2024</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <!-- ── NUEVA PRESENTACIÓN — copia el bloque de arriba y ajusta ──
    <a class="card" href="./presentacion-2/index.html">
      <span class="card-number">02</span>
      <div class="card-title">Segunda presentación</div>
      <p class="card-desc">Descripción aquí.</p>
      <div class="card-footer">
        <span class="tag">2025</span>
        <span class="arrow">→</span>
      </div>
    </a>
    -->

    <!-- Placeholder: próxima presentación -->
    <div class="card card-add">
      <div class="plus">+</div>
      <span>Próxima presentación</span>
    </div>

  </div>

  <footer>
    <span>github.io · mis-presentaciones</span>
    <span id="fecha"></span>
  </footer>

  <script>
    // Cuenta automática de cards activas (excluye el placeholder)
    const cards = document.querySelectorAll('.card:not(.card-add)');
    document.getElementById('count').textContent =
      String(cards.length).padStart(2, '0');

    // Fecha actual en el footer
    document.getElementById('fecha').textContent =
      new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long' });
  </script>

</body>
</html>
